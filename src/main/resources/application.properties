# OAuth2 Client Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# OAuth2 Success URL
oauth2.client.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
oauth2.client.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
oauth2.client.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
