<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #343a40; }
        .container { margin-top: 50px; }
        .welcome-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Auth System</span>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </nav>
    <div class="container text-center">
        <div class="welcome-card">
            <h1>Welcome, <span sec:authentication="name">User</span>!</h1>
            <p class="lead">You have successfully logged into the system.</p>
            <hr>
            <p>Your roles: <span sec:authentication="principal.authorities">Roles</span></p>
        </div>
    </div>
</body>
</html>
